<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チーム食材シミュレーター｜ポケモンスリープ攻略ツール</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Nunito:wght@600;700;800&display=swap');

    :root {
      --pks-night-deep: #161029;
      --pks-night-panel: #251c47;
      --pks-night-panel-2: #2f2459;
      --pks-purple: #a98ee8;
      --pks-star: #ffd166;
      --pks-star-soft: #ffe9b0;
      --pks-text: #ece6fa;
      --pks-text-dim: #9b8fc2;
      --pks-green: #7fd9a8;
      --pks-red: #ff7e7e;
      --pks-border: rgba(169,142,232,0.25);
      --pks-border-green: rgba(127,217,168,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Zen Maru Gothic', sans-serif;
      color: var(--pks-text);
      background:
        radial-gradient(ellipse 600px 300px at 15% 0%, rgba(169,142,232,0.18), transparent 60%),
        radial-gradient(ellipse 500px 400px at 90% 20%, rgba(255,209,102,0.08), transparent 55%),
        linear-gradient(180deg, var(--pks-night-deep) 0%, #1d1638 100%);
      min-height: 100vh;
      padding: 24px 16px 80px;
      
    }
        body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 10% 15%, rgba(255,209,102,0.7), transparent),
        radial-gradient(2px 2px at 80% 10%, rgba(255,209,102,0.5), transparent),
        radial-gradient(1.5px 1.5px at 60% 30%, rgba(236,230,250,0.6), transparent),
        radial-gradient(2px 2px at 30% 60%, rgba(169,142,232,0.5), transparent),
        radial-gradient(1.5px 1.5px at 90% 70%, rgba(255,209,102,0.4), transparent);
      z-index: 0;
    }

    .pks-wrap { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; }

    .pks-eyebrow {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 800; letter-spacing: 0.12em;
      color: var(--pks-star); margin-bottom: 8px;
    }
    .pks-eyebrow::before { content: "✦"; font-size: 13px; }

    h1 {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 4px;
    }

    .pks-sub {
      font-size: 12.5px; color: var(--pks-text-dim);
      margin-bottom: 22px; line-height: 1.7;
    }

    /* ステップバー */
    .pks-steps { display: flex; gap: 5px; margin-bottom: 22px; }
    .pks-step {
      flex: 1; text-align: center; font-size: 10.5px; font-weight: 800;
      padding: 7px 2px; border-radius: 10px;
      border: 1.5px solid var(--pks-border);
      color: var(--pks-text-dim); letter-spacing: 0.02em;
    }
    .pks-step.active {
      background: linear-gradient(135deg, var(--pks-night-panel), var(--pks-night-panel-2));
      border-color: var(--pks-purple); color: var(--pks-text);
    }
    .pks-step.done {
      background: rgba(127,217,168,0.1);
      border-color: var(--pks-border-green);
      color: var(--pks-green);
    }
  </style>
</head>
<body>
<div class="pks-wrap">

  <div class="pks-eyebrow">POKEMON SLEEP TOOLS</div>
  <h1>チーム食材シミュレーター</h1>
  <p class="pks-sub">チーム5体の編成を決めて、21食分の食材が集まるか計算します。</p>

  <div class="pks-steps">
    <div class="pks-step active" id="stepTab0">① 編成</div>
    <div class="pks-step" id="stepTab1">② ポケモン</div>
    <div class="pks-step" id="stepTab2">③ 料理</div>
    <div class="pks-step" id="stepTab3">④ 結果</div>
  </div>

  <!-- ===== STEP 0: 編成 ===== -->
  <div id="step0">
    <div class="pks-panel">
      <div class="pks-panel-title">🧩 チーム編成（合計5体）</div>
      <div class="pks-comp-grid">
        <div class="pks-comp-item">
          <span class="pks-comp-emoji">🍒</span>
          <label>きのみ</label>
          <div class="pks-counter">
            <button class="pks-counter-btn" onclick="changeComp('berry',-1)">−</button>
            <span class="pks-counter-val" id="compVal_berry">0</span>
            <button class="pks-counter-btn" onclick="changeComp('berry',1)">＋</button>
          </div>
        </div>

        <div class="pks-comp-item">
          <span class="pks-comp-emoji">🍳</span>
          <label>食材</label>
          <div class="pks-counter">
            <button class="pks-counter-btn" onclick="changeComp('ing',-1)">−</button>
            <span class="pks-counter-val" id="compVal_ing">0</span>
            <button class="pks-counter-btn" onclick="changeComp('ing',1)">＋</button>
          </div>
        </div>

        <div class="pks-comp-item">
          <span class="pks-comp-emoji">⚡</span>
          <label>スキル</label>
          <div class="pks-counter">
            <button class="pks-counter-btn" onclick="changeComp('skill',-1)">−</button>
            <span class="pks-counter-val" id="compVal_skill">0</span>
            <button class="pks-counter-btn" onclick="changeComp('skill',1)">＋</button>
          </div>
        </div>

        <div class="pks-comp-item">
          <span class="pks-comp-emoji">💚</span>
          <label>ヒーラー</label>
          <div class="pks-counter">
            <button class="pks-counter-btn" onclick="changeComp('healer',-1)">−</button>
            <span class="pks-counter-val" id="compVal_healer">0</span>
            <button class="pks-counter-btn" onclick="changeComp('healer',1)">＋</button>
          </div>
        </div>
      </div>

      <div class="pks-comp-total ng" id="compTotal">合計 0 / 5 体</div>
    </div>

    <button class="pks-btn-primary" id="btnToStep1" disabled>次へ：ポケモンを登録する →</button>
  </div>

  <!-- ===== STEP 1: ポケモン登録 ===== -->
  <div id="step1" class="pks-hidden">
    <div id="pokemonSections"></div>
    <button class="pks-btn-secondary" id="btnBack0">← 編成を修正</button>
    <button class="pks-btn-primary" id="btnToStep2">次へ：料理を登録する →</button>
  </div>

  <!-- ===== STEP 2: 料理登録 ===== -->
  <div id="step2" class="pks-hidden">
    <div class="pks-panel">
      <div class="pks-panel-title">🍽️ 21食分の料理を登録</div>
      <p style="font-size:12px;color:var(--pks-text-dim);margin-bottom:12px;">
        ジャンルと料理名を選び、食数を入力してください。
      </p>

      <div id="recipeList"></div>
      <button class="pks-btn-add" id="btnAddRecipe">＋ 料理を追加</button>
      <div class="pks-total-line ng" id="recipeTotal">合計：0 食</div>
    </div>

    <button class="pks-btn-secondary" id="btnBack1">← ポケモンを修正</button>
    <button class="pks-btn-primary" id="btnToStep3">計算する →</button>
  </div>

  <!-- ===== STEP 3: 結果 ===== -->
  <div id="step3" class="pks-hidden">
    <div class="pks-panel">
      <div id="resultContent"></div>
    </div>

    <button class="pks-btn-secondary" id="btnBack2">← 料理を修正</button>
    <button class="pks-btn-secondary" id="btnRestart">最初からやり直す</button>
  </div>

  <p class="pks-footnote">トフメンタルパパのポケモンスリープ攻略ツール</p>
</div>

<!-- ===== main.js 読み込み ===== -->
<script src="main.js"></script>

</body>
</html>
