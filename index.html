<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チーム食材シミュレーター｜ポケモンスリープ攻略ツール</title>

  <style>
    /* ====== 基本スタイル ====== */
    body {
      font-family: 'Nunito','Zen Maru Gothic',sans-serif;
      background:#1d1638;
      color:#ece6fa;
      padding:20px;
    }
    .pks-wrap { max-width:520px; margin:0 auto; }

    /* ====== ステップ切替 ====== */
    .pks-hidden { display:none !important; }

    .pks-steps { display:flex; gap:6px; margin-bottom:16px; }
    .pks-step {
      padding:6px; border:1px solid #666; border-radius:8px;
      font-size:12px; text-align:center;
    }
    .pks-step.active { background:#4b3b7a; color:#fff; border-color:#a98ee8; }
    .pks-step.done { background:#2a5; color:#fff; border-color:#7fd9a8; }

    /* ====== パネル ====== */
    .pks-panel {
      background:#251c47;
      border:1px solid rgba(169,142,232,0.25);
      border-radius:16px;
      padding:16px;
      margin-bottom:16px;
    }
    .pks-panel-title {
      font-size:14px; font-weight:900;
      margin-bottom:12px; color:#ffe9b0;
    }

    /* ====== カウンター ====== */
    .pks-comp-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .pks-comp-item { background:#2f2459; padding:12px; border-radius:12px; }

    .pks-counter { display:flex; align-items:center; gap:8px; }
    .pks-counter-btn {
      width:32px; height:32px; border-radius:8px;
      background:#a98ee833; color:#a98ee8;
      font-size:18px; font-weight:900;
      border:1px solid #a98ee855;
    }
    .pks-counter-val { font-size:22px; font-weight:900; }

    .pks-comp-total {
      text-align:center; padding:10px; border-radius:10px; font-weight:700;
    }
    .pks-comp-total.ok { background:#7fd9a822; color:#7fd9a8; border:1px solid #7fd9a8; }
    .pks-comp-total.ng { background:#ff7e7e22; color:#ff7e7e; border:1px solid #ff7e7e; }

    /* ====== ボタン ====== */
    .pks-btn-primary {
      width:100%; padding:12px; border-radius:10px;
      background:#ffd166; color:#2a1f4d;
      font-weight:900; margin-top:8px;
    }
    .pks-btn-primary:disabled { opacity:0.4; }

    .pks-btn-secondary {
      width:100%; padding:10px; border-radius:10px;
      background:#a98ee822; color:#fff;
      border:1px solid #a98ee855; margin-top:8px;
    }

    /* ====== ポケモンカード ====== */
    .pks-pokemon-card {
      background:#2f2459;
      border:1px solid rgba(169,142,232,0.25);
      border-radius:12px;
      padding:12px;
      margin-bottom:10px;
    }
    .pks-card-header { display:flex; justify-content:space-between; margin-bottom:8px; }
    .pks-card-label { font-size:12px; font-weight:800; color:#ffd166; }

    /* ====== フォーム ====== */
    .field { margin-bottom:10px; }
    label { font-size:11px; color:#9b8fc2; margin-bottom:4px; display:block; }

    select,input[type="number"] {
      width:100%; padding:8px; border-radius:8px;
      background:#1d1638; color:#fff;
      border:1px solid #a98ee855;
    }

    .pks-row2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

    /* ====== 料理行 ====== */
    .pks-recipe-row {
      display:grid; grid-template-columns:1fr 1fr 60px 36px;
      gap:6px; align-items:end; margin-bottom:8px;
    }
    .pks-recipe-remove {
      background:#ff7e7e33; border:1px solid #ff7e7e55;
      color:#ff7e7e; border-radius:8px; height:36px;
    }

    /* ====== 結果 ====== */
    .pks-verdict { text-align:center; margin-bottom:12px; }
    .pks-verdict-main.ok { color:#7fd9a8; font-size:22px; font-weight:900; }
    .pks-verdict-main.ng { color:#ff7e7e; font-size:22px; font-weight:900; }

  </style>
</head>

<body>
<div class="pks-wrap">

  <h1>チーム食材シミュレーター</h1>

  <!-- ステップバー -->
  <div class="pks-steps">
    <div class="pks-step active" id="stepTab0">① 編成</div>
    <div class="pks-step" id="stepTab1">② ポケモン</div>
    <div class="pks-step" id="stepTab2">③ 料理</div>
    <div class="pks-step" id="stepTab3">④ 結果</div>
  </div>
  <!-- STEP 0：編成 -->
  <div id="step0">
    <div class="pks-panel">
      <div class="pks-panel-title">🧩 チーム編成（合計5体）</div>

      <div class="pks-comp-grid">
        <div class="pks-comp-item">
          <div>🍒 きのみ</div>
          <div class="pks-counter">
            <button class="pks-counter-btn" onclick="changeComp('berry',-1)">−</button>
            <span class="pks-counter-val" id="compVal_berry">0</span>
            <button class="pks-counter-btn" onclick="changeComp('berry',1)">＋</button>
          </div>
        </div>

        <div class="pks-comp-item">
          <div>🍳 食材</div>
          <div class="pks-counter">
            <button class="pks-counter-btn" onclick="changeComp('ing',-1)">−</button>
            <span class="pks-counter-val" id="compVal_ing">0</span>
            <button class="pks-counter-btn" onclick="changeComp('ing',1)">＋</button>
          </div>
        </div>

        <div class="pks-comp-item">
          <div>⚡ スキル</div>
          <div class="pks-counter">
            <button class="pks-counter-btn" onclick="changeComp('skill',-1)">−</button>
            <span class="pks-counter-val" id="compVal_skill">0</span>
            <button class="pks-counter-btn" onclick="changeComp('skill',1)">＋</button>
          </div>
        </div>

        <div class="pks-comp-item">
          <div>💚 ヒーラー</div>
          <div class="pks-counter">
            <button class="pks-counter-btn" onclick="changeComp('healer',-1)">−</button>
            <span class="pks-counter-val" id="compVal_healer">0</span>
            <button class="pks-counter-btn" onclick="changeComp('healer',1)">＋</button>
          </div>
        </div>
      </div>

      <div class="pks-comp-total ng" id="compTotal">合計 0 / 5 体</div>
    </div>

    <button class="pks-btn-primary" id="btnToStep1" disabled>
      次へ：ポケモンを登録する →
    </button>
  </div>

  <!-- STEP 1：ポケモン登録 -->
  <div id="step1" class="pks-hidden">
    <div id="pokemonSections"></div>

    <button class="pks-btn-secondary" id="btnBack0">← 編成を修正</button>
    <button class="pks-btn-primary" id="btnToStep2">次へ：料理を登録する →</button>
  </div>

  <!-- STEP 2：料理登録 -->
  <div id="step2" class="pks-hidden">
    <div class="pks-panel">
      <div class="pks-panel-title">🍽️ 21食分の料理を登録</div>

      <div id="recipeList"></div>

      <button class="pks-btn-secondary" id="btnAddRecipe">＋ 料理を追加</button>
      <div class="pks-total-line ng" id="recipeTotal">合計：0 食</div>
    </div>

    <button class="pks-btn-secondary" id="btnBack1">← ポケモンを修正</button>
    <button class="pks-btn-primary" id="btnToStep3">計算する →</button>
  </div>

  <!-- STEP 3：結果 -->
  <div id="step3" class="pks-hidden">
    <div class="pks-panel">
      <div id="resultContent"></div>
    </div>

    <button class="pks-btn-secondary" id="btnBack2">← 料理を修正</button>
    <button class="pks-btn-secondary" id="btnRestart">最初からやり直す</button>
  </div>

</div> <!-- pks-wrap 終了 -->
<script>
/* ====== JSON URL ====== */
const POKEMON_JSON_URL =
  "https://tofumental555.github.io/ingredient-simulator2/pokemon_data.json";

/* ====== 状態 ====== */
let pokemonDB = [];
let recipeRows = [];
let uid = 0;
const comp = { berry:0, ing:0, skill:0, healer:0 };
let pokemonSlots = [];

/* ====== 初期化 ====== */
async function loadDB() {
  try {
    pokemonDB = await (await fetch(POKEMON_JSON_URL)).json();
  } catch(e) {
    console.warn("pokemon_data.json読み込みエラー:", e);
    pokemonDB = [];
  }
  initEvents();
}

/* ====== イベント登録 ====== */
function initEvents() {
  document.getElementById("btnToStep1").onclick = () => {
    buildPokemonSlots();
    goStep(1);
  };
  document.getElementById("btnBack0").onclick = () => goStep(0);
  document.getElementById("btnToStep2").onclick = () => goStep(2);
  document.getElementById("btnBack1").onclick = () => goStep(1);
  document.getElementById("btnToStep3").onclick = () => goStep(3);
  document.getElementById("btnBack2").onclick = () => goStep(2);
  document.getElementById("btnRestart").onclick = () => location.reload();
  document.getElementById("btnAddRecipe").onclick = addRecipeRow;

  addRecipeRow();
}

/* ====== STEP 切替 ====== */
function goStep(n) {
  ["step0","step1","step2","step3"].forEach((id,i)=>{
    document.getElementById(id).classList.toggle("pks-hidden", i!==n);
  });
  ["stepTab0","stepTab1","stepTab2","stepTab3"].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.className="pks-step"+(i<n?" done":i===n?" active":"");
  });
  if(n===3) calculate();
}

/* ====== 編成カウンター ====== */
function changeComp(key,delta){
  const total=comp.berry+comp.ing+comp.skill+comp.healer;
  const next=comp[key]+delta;
  if(next<0) return;
  if(delta>0 && total>=5) return;
  comp[key]=next;
  updateCompUI();
}

function updateCompUI(){
  const total=comp.berry+comp.ing+comp.skill+comp.healer;

  ["berry","ing","skill","healer"].forEach(k=>{
    document.getElementById(`compVal_${k}`).textContent=comp[k];
  });

  const el=document.getElementById("compTotal");
  el.textContent=`合計 ${total} / 5 体`;
  el.className="pks-comp-total "+(total===5?"ok":"ng");

  document.getElementById("btnToStep1").disabled=(total!==5);
}
/* ====== ポケモンスロット生成 ====== */
function buildPokemonSlots(){
  pokemonSlots=[];
  const section=document.getElementById("pokemonSections");
  section.innerHTML="";

  const SLOT_CONFIG=[
    {key:"berry",label:"きのみ",emoji:"🍒"},
    {key:"ing",label:"食材",emoji:"🍳"},
    {key:"skill",label:"スキル",emoji:"⚡"},
    {key:"healer",label:"ヒーラー",emoji:"💚"}
  ];

  SLOT_CONFIG.forEach(cfg=>{
    const count=comp[cfg.key];
    if(count===0) return;

    const panel=document.createElement("div");
    panel.className="pks-panel";
    panel.innerHTML=`<div class="pks-panel-title">${cfg.emoji} ${cfg.label}ポケモン（${count}体）</div>`;

    for(let i=0;i<count;i++){
      const id=uid++;
      const prefix=`slot_${id}`;
      pokemonSlots.push({slotType:cfg.key,prefix});

      const card=document.createElement("div");
      card.className="pks-pokemon-card";
      card.innerHTML=`
        <div class="pks-card-header">
          <span class="pks-card-label">${cfg.emoji} ${cfg.label} ${i+1}</span>
        </div>
        ${pokemonFormHTML(prefix)}
      `;
      panel.appendChild(card);
    }
    section.appendChild(panel);
  });
}

/* ====== ポケモンフォーム ====== */
function optsPokemon(){
  if(!pokemonDB.length) return `<option value="">（データなし）</option>`;
  return pokemonDB.map(p=>`<option value="${p.name}">${p.name}</option>`).join("");
}

function pokemonFormHTML(pre){
  return `
    <div class="field">
      <label>ポケモン</label>
      <select id="${pre}_p">${optsPokemon()}</select>
    </div>

    <div class="pks-row2">
      <div class="field">
        <label>レベル</label>
        <input type="number" id="${pre}_lv" value="50" min="1" max="60">
      </div>

      <div class="field">
        <label>食材配列</label>
        <select id="${pre}_pat">
          <option value="aaa">aaa</option>
          <option value="aab">aab</option>
          <option value="aac">aac</option>
          <option value="aba">aba</option>
          <option value="abb">abb</option>
          <option value="abc">abc</option>
        </select>
      </div>
    </div>
  `;
}

/* ====== 料理データ（簡易版） ====== */
const RECIPE_DATA={
  genres:["カレー","サラダ","デザート"],
  recipes:{
    "カレー":{"とくせんリンゴカレー":{"とくせんリンゴ":7}},
    "サラダ":{"とくせんリンゴサラダ":{"とくせんリンゴ":8}},
    "デザート":{"ねがいごとアップルパイ":{"とくせんリンゴ":12}}
  }
};

/* ====== 料理行 ====== */
function buildGenreOpts(sel){
  return RECIPE_DATA.genres.map(g=>`<option value="${g}"${g===sel?" selected":""}>${g}</option>`).join("");
}
function buildRecipeOpts(genre){
  return Object.keys(RECIPE_DATA.recipes[genre]).map(n=>`<option value="${n}">${n}</option>`).join("");
}

function addRecipeRow(){
  const id=uid++;
  recipeRows.push(id);
  const g0=RECIPE_DATA.genres[0];

  const row=document.createElement("div");
  row.className="pks-recipe-row";
  row.id=`rr_${id}`;
  row.innerHTML=`
    <div class="field">
      <label>ジャンル</label>
      <select id="rg_${id}" onchange="onGenreChange(${id})">${buildGenreOpts(g0)}</select>
    </div>

    <div class="field">
      <label>料理名</label>
      <select id="rn_${id}" onchange="updateRecipeTotal()">${buildRecipeOpts(g0)}</select>
    </div>

    <div class="field">
      <label>食数</label>
      <input type="number" id="rc_${id}" value="1" min="1" max="21" onchange="updateRecipeTotal()">
    </div>

    <button class="pks-recipe-remove" onclick="removeRecipeRow(${id})">✕</button>
  `;
  document.getElementById("recipeList").appendChild(row);
  updateRecipeTotal();
}

function onGenreChange(id){
  const g=document.getElementById(`rg_${id}`).value;
  document.getElementById(`rn_${id}`).innerHTML=buildRecipeOpts(g);
  updateRecipeTotal();
}

function removeRecipeRow(id){
  recipeRows=recipeRows.filter(x=>x!==id);
  document.getElementById(`rr_${id}`).remove();
  updateRecipeTotal();
}

function updateRecipeTotal(){
  const total=recipeRows.reduce((s,id)=>s+(Number(document.getElementById(`rc_${id}`).value)||0),0);
  const el=document.getElementById("recipeTotal");
  el.textContent=`合計：${total} 食`;
  el.className="pks-total-line "+(total===21?"ok":"ng");
}

/* ====== 計算 ====== */
function getEntry(pre){
  const name=document.getElementById(`${pre}_p`).value;
  if(!name) return null;

  const pokemon=pokemonDB.find(p=>p.name===name);
  if(!pokemon) return null;

  return {
    pokemon,
    level:Number(document.getElementById(`${pre}_lv`).value||50),
    pattern:document.getElementById(`${pre}_pat`).value||"aaa"
  };
}

function calcWeekly(entry){
  if(!entry) return {};

  const {pokemon,level,pattern}=entry;

  const levelCoef=1-(level-1)*0.002;
  const interval=(pokemon.helpTime*levelCoef)/2.222;
  const hpw=7*86400/interval;

  const fr=(pokemon.ingredientFindRate||0)/100;

  const slots=level<30?[1]:level<60?[1,2]:[1,2,3];
  const sp=1/slots.length;

  const result={};

  for(const slot of slots){
    let ing=null,cnt=0;

    if(slot===1){
      ing=pokemon.ingredientA;
      cnt=pokemon["1a"]||0;
    }else if(slot===2){
      const t=pattern[1];
      ing=t==="a"?pokemon.ingredientA:pokemon.ingredientB;
      cnt=t==="a"?(pokemon["2a"]||0):(pokemon["2b"]||0);
    }else{
      const t=pattern[2];
      if(t==="a"){ ing=pokemon.ingredientA; cnt=pokemon["3a"]||0; }
      else if(t==="b"){ ing=pokemon.ingredientB; cnt=pokemon["3b"]||0; }
      else{ ing=pokemon.ingredientC; cnt=pokemon["3c"]||0; }
    }

    if(ing && cnt>0){
      result[ing]=(result[ing]||0)+hpw*fr*cnt*sp;
    }
  }

  return result;
}

function mergeIng(a,b){
  const r={...a};
  for(const[k,v]of Object.entries(b)) r[k]=(r[k]||0)+v;
  return r;
}

function calculate(){
  let have={};
  const perPokemon=[];

  for(const slot of pokemonSlots){
    const e=getEntry(slot.prefix);
    if(!e) continue;

    const weekly=calcWeekly(e);
    have=mergeIng(have,weekly);

    const daily={};
    for(const[k,v]of Object.entries(weekly)) daily[k]=v/7;

    perPokemon.push({name:e.pokemon.name,slotType:slot.slotType,daily});
  }

  const need={};
  for(const id of recipeRows){
    const genre=document.getElementById(`rg_${id}`).value;
    const name=document.getElementById(`rn_${id}`).value;
    const count=Number(document.getElementById(`rc_${id}`).value||0);

    const recipe=RECIPE_DATA.recipes[genre][name];
    for(const[ing,per]of Object.entries(recipe)){
      need[ing]=(need[ing]||0)+per*count;
    }
  }

  const needKeys=Object.keys(need);
  let allOk=true,minRatio=Infinity;

  for(const k of needKeys){
    const ratio=(have[k]||0)/need[k];
    if(ratio<1) allOk=false;
    if(ratio<minRatio) minRatio=ratio;
  }

  renderResult(have,need,perPokemon,allOk,minRatio);
}

/* ====== 結果表示 ====== */
function renderResult(have,need,perPokemon,allOk,minRatio){
  const needKeys=Object.keys(need);

  const ingHtml=needKeys.map(k=>{
    const h=have[k]||0,n=need[k];
    const ok=h>=n;
    const pct=Math.min(h/n,1)*100;

    return `
      <div class="pks-ing-card">
        <div class="pks-ing-name">${k}</div>
        <div class="pks-ing-bar-bg">
          <div class="pks-ing-bar ${ok?"ok":"ng"}" style="width:${pct}%"></div>
        </div>
        <div class="pks-ing-nums">
          <span class="pks-ing-have ${ok?"ok":"ng"}">${h.toFixed(1)}個</span>
          <span class="pks-ing-need">必要:${n}</span>
        </div>
      </div>
    `;
  }).join("");

  const verdict=allOk
    ? `<div class="pks-verdict-main ok">✅ 21食分 準備OK！</div>`
    : `<div class="pks-verdict-main ng">❌ 食材が不足しています</div>`;

  document.getElementById("resultContent").innerHTML=`
    <div class="pks-verdict">
      ${verdict}
      <div class="pks-verdict-sub">1週間（7日）・21食分シミュレーション結果</div>
    </div>

    <div class="pks-panel-title">食材ごとの充足状況（週間）</div>
    <div class="pks-ing-grid">${ingHtml}</div>
  `;
}

/* ====== 実行開始 ====== */
loadDB();
</script>

</body>
</html>
