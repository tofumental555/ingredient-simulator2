<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>チーム食材シミュレーター｜ポケモンスリープ攻略ツール</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Nunito:wght@600;700;800&display=swap');

    :root {
      --pks-night-deep: #161029;
      --pks-night-panel: #251c47;
      --pks-night-panel-2: #2f2459;
      --pks-purple: #a98ee8;
      --pks-star: #ffd166;
      --pks-star-soft: #ffe9b0;
      --pks-text: #ece6fa;
      --pks-text-dim: #9b8fc2;
      --pks-green: #7fd9a8;
      --pks-red: #ff7e7e;
      --pks-border: rgba(169,142,232,0.25);
      --pks-border-green: rgba(127,217,168,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Zen Maru Gothic', sans-serif;
      color: var(--pks-text);
      background:
        radial-gradient(ellipse 600px 300px at 15% 0%, rgba(169,142,232,0.18), transparent 60%),
        radial-gradient(ellipse 500px 400px at 90% 20%, rgba(255,209,102,0.08), transparent 55%),
        linear-gradient(180deg, var(--pks-night-deep) 0%, #1d1638 100%);
      min-height: 100vh;
      padding: 24px 16px 80px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 10% 15%, rgba(255,209,102,0.7), transparent),
        radial-gradient(2px 2px at 80% 10%, rgba(255,209,102,0.5), transparent),
        radial-gradient(1.5px 1.5px at 60% 30%, rgba(236,230,250,0.6), transparent),
        radial-gradient(2px 2px at 30% 60%, rgba(169,142,232,0.5), transparent),
        radial-gradient(1.5px 1.5px at 90% 70%, rgba(255,209,102,0.4), transparent);
      z-index: 0;
    }
    .pks-wrap { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; }

    .pks-eyebrow {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 800; letter-spacing: 0.12em;
      color: var(--pks-star); margin-bottom: 8px;
    }
    .pks-eyebrow::before { content: "✦"; font-size: 13px; }
    h1 { font-family: 'Zen Maru Gothic', sans-serif; font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 4px; }
    .pks-sub { font-size: 12.5px; color: var(--pks-text-dim); margin-bottom: 22px; line-height: 1.7; }

    /* ステップバー */
    .pks-steps { display: flex; gap: 5px; margin-bottom: 22px; }
    .pks-step {
      flex: 1; text-align: center; font-size: 10.5px; font-weight: 800;
      padding: 7px 2px; border-radius: 10px;
      border: 1.5px solid var(--pks-border); color: var(--pks-text-dim); letter-spacing: 0.02em;
    }
    .pks-step.active { background: linear-gradient(135deg, var(--pks-night-panel), var(--pks-night-panel-2)); border-color: var(--pks-purple); color: var(--pks-text); }
    .pks-step.done { background: rgba(127,217,168,0.1); border-color: var(--pks-border-green); color: var(--pks-green); }

    /* パネル */
    .pks-panel {
      background: linear-gradient(165deg, var(--pks-night-panel) 0%, var(--pks-night-panel-2) 100%);
      border: 1px solid var(--pks-border); border-radius: 20px; padding: 18px 16px; margin-bottom: 14px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .pks-panel-title { font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; font-weight: 900; color: var(--pks-star-soft); margin-bottom: 14px; }

    /* フォーム */
    .field { margin-bottom: 10px; }
    label { display: block; font-size: 11px; font-weight: 700; color: var(--pks-text-dim); margin-bottom: 4px; }
    .pks-sw { position: relative; }
    .pks-sw::after { content: "▾"; position: absolute; right: 11px; top: 50%; transform: translateY(-50%); color: var(--pks-purple); font-size: 11px; pointer-events: none; }
    select, input[type="number"] {
      width: 100%; font-family: 'Nunito', sans-serif; font-size: 13.5px; font-weight: 700;
      color: var(--pks-text); background: rgba(22,16,41,0.6);
      border: 1.5px solid var(--pks-border); border-radius: 9px; padding: 8px 11px; appearance: none; outline: none;
    }
    select:focus, input[type="number"]:focus { border-color: var(--pks-purple); }
    .pks-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pks-subs { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .pks-subs .pks-sw:last-child { grid-column: span 2; }

    /* 編成カウンター */
    .pks-comp-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .pks-comp-item {
      background: rgba(22,16,41,0.5);
      border: 1.5px solid var(--pks-border);
      border-radius: 12px;
      padding: 12px;
    }
    .pks-comp-label {
      font-size: 13px;
      font-weight: 800;
      color: var(--pks-text);
      margin-bottom: 8px;
      display: block;
    }
    .pks-comp-item .pks-comp-emoji { font-size: 18px; display: block; margin-bottom: 4px; }
    .pks-counter {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pks-counter-btn {
      width: 32px; height: 32px;
      background: rgba(169,142,232,0.18);
      border: 1.5px solid var(--pks-border);
      border-radius: 8px;
      color: var(--pks-purple);
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      line-height: 1;
    }
    .pks-counter-val {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--pks-text);
      min-width: 24px;
      text-align: center;
    }
    .pks-comp-total {
      text-align: center;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .pks-comp-total.ok { background: rgba(127,217,168,0.1); color: var(--pks-green); border: 1px solid var(--pks-border-green); }
    .pks-comp-total.ng { background: rgba(255,126,126,0.08); color: var(--pks-red); border: 1px solid rgba(255,126,126,0.25); }

    /* ポケモンカード */
    .pks-pokemon-card {
      background: rgba(22,16,41,0.5);
      border: 1.5px solid var(--pks-border);
      border-radius: 13px;
      padding: 13px;
      margin-bottom: 10px;
    }
    .pks-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .pks-card-label { font-size: 11px; font-weight: 800; color: var(--pks-star); letter-spacing: 0.06em; }

    /* タイプ別カラー */
    .pks-card-label.berry  { color: #f4a36f; }
    .pks-card-label.ing    { color: var(--pks-star); }
    .pks-card-label.skill  { color: #a0d4ff; }
    .pks-card-label.healer { color: var(--pks-green); }

    /* ボタン */
    .pks-btn-primary {
      width: 100%; font-family: 'Zen Maru Gothic', sans-serif; font-size: 14px; font-weight: 900;
      letter-spacing: 0.04em; color: #2a1f4d;
      background: linear-gradient(135deg, var(--pks-star) 0%, #ffb84d 100%);
      border: none; border-radius: 12px; padding: 13px; cursor: pointer; margin-top: 6px; display: block;
    }
    .pks-btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .pks-btn-secondary {
      width: 100%; font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--pks-text); background: rgba(169,142,232,0.12);
      border: 1.5px solid var(--pks-border); border-radius: 12px; padding: 11px;
      cursor: pointer; margin-top: 8px; display: block;
    }

    /* 料理行 */
    .pks-recipe-row {
      display: grid;
      grid-template-columns: 1fr 1fr 64px 36px;
      gap: 6px;
      align-items: end;
      margin-bottom: 8px;
    }
    .pks-recipe-row input[type="number"] { padding: 8px 8px; }
    .pks-recipe-remove {
      background: rgba(255,126,126,0.12); border: 1px solid rgba(255,126,126,0.25);
      color: var(--pks-red); border-radius: 8px; height: 36px; width: 36px;
      font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .pks-btn-add {
      width: 100%; font-family: 'Zen Maru Gothic', sans-serif; font-size: 12.5px; font-weight: 700;
      color: var(--pks-purple); background: rgba(169,142,232,0.08);
      border: 1.5px dashed rgba(169,142,232,0.35); border-radius: 11px;
      padding: 9px; cursor: pointer; margin-top: 4px; display: block;
    }
    .pks-remove-btn {
      background: rgba(255,126,126,0.15);
      border: 1px solid rgba(255,126,126,0.35);
      color: var(--pks-red);
      border-radius: 7px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .pks-total-line { text-align: right; font-size: 12px; color: var(--pks-text-dim); margin-top: 8px; }
    .pks-total-line.ok { color: var(--pks-green); }
    .pks-total-line.ng { color: var(--pks-red); }

    /* 結果 */
    .pks-verdict { text-align: center; padding: 18px 0 14px; }
    .pks-verdict-main { font-family: 'Zen Maru Gothic', sans-serif; font-size: 26px; font-weight: 900; margin-bottom: 3px; }
    .pks-verdict-main.ok { color: var(--pks-green); }
    .pks-verdict-main.ng { color: var(--pks-red); }
    .pks-verdict-sub { font-size: 12px; color: var(--pks-text-dim); }
    .pks-ing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 12px; }
    .pks-ing-card { background: rgba(22,16,41,0.5); border-radius: 10px; padding: 10px 11px; }
    .pks-ing-name { font-size: 10.5px; color: var(--pks-text-dim); margin-bottom: 4px; }
    .pks-ing-bar-bg { background: rgba(255,255,255,0.06); border-radius: 4px; height: 4px; margin-bottom: 5px; overflow: hidden; }
    .pks-ing-bar { height: 100%; border-radius: 4px; }
    .pks-ing-bar.ok { background: var(--pks-green); }
    .pks-ing-bar.ng { background: var(--pks-red); }
    .pks-ing-nums { display: flex; justify-content: space-between; font-size: 11px; }
    .pks-ing-have.ok { color: var(--pks-green); }
    .pks-ing-have.ng { color: var(--pks-red); }
    .pks-ing-need { color: var(--pks-text-dim); }
    .pks-surplus { background: rgba(127,217,168,0.08); border: 1.5px solid var(--pks-border-green); border-radius: 12px; padding: 13px 15px; margin-top: 12px; }
    .pks-surplus-label { font-size: 11px; font-weight: 700; color: var(--pks-green); margin-bottom: 4px; }
    .pks-surplus-val { font-family: 'Zen Maru Gothic', sans-serif; font-size: 24px; font-weight: 900; color: var(--pks-green); }
    .pks-surplus-desc { font-size: 11.5px; color: var(--pks-text-dim); margin-top: 2px; }
    .pks-shortage { background: rgba(255,126,126,0.07); border: 1.5px solid rgba(255,126,126,0.28); border-radius: 12px; padding: 13px 15px; margin-top: 12px; }
    .pks-shortage-label { font-size: 11px; font-weight: 700; color: var(--pks-red); margin-bottom: 6px; }
    .pks-shortage-item { font-size: 12.5px; color: var(--pks-text-dim); line-height: 1.9; }
    .pks-extra { background: rgba(169,142,232,0.07); border: 1px solid var(--pks-border); border-radius: 12px; padding: 12px 14px; margin-top: 10px; }
    .pks-extra-label { font-size: 11px; font-weight: 700; color: var(--pks-purple); margin-bottom: 5px; }
    .pks-extra-item { font-size: 12px; color: var(--pks-text-dim); line-height: 1.9; }

    .pks-footnote { text-align: center; font-size: 11px; color: var(--pks-text-dim); opacity: 0.6; margin-top: 24px; }
    .pks-hidden { display: none !important; }

    /* 結果セクションタイトル */
    .pks-result-section-title {
      font-size: 11.5px; font-weight: 800; color: var(--pks-text-dim);
      margin: 12px 0 8px; letter-spacing: 0.03em;
    }

    /* ポケモン別食材内訳 */
    .pks-pb-list { display: flex; flex-direction: column; gap: 8px; }
    .pks-pb-card {
      background: rgba(22,16,41,0.5);
      border: 1.5px solid var(--pks-border);
      border-radius: 11px;
      padding: 10px 13px;
    }
    .pks-pb-name {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 13px; font-weight: 700;
      color: var(--pks-star-soft);
      margin-bottom: 7px;
    }
    .pks-pb-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; line-height: 1.8;
    }
    .pks-pb-ing { color: var(--pks-text-dim); }
    .pks-pb-val { color: var(--pks-green); font-weight: 700; }
  </style>
</head>
<body>
<div class="pks-wrap">

  <div class="pks-eyebrow">POKEMON SLEEP TOOLS</div>
  <h1>チーム食材シミュレーター</h1>
  <p class="pks-sub">チーム5体の編成を決めて、21食分の食材が集まるか計算します。</p>

  <div class="pks-steps">
    <div class="pks-step active" id="stepTab0">① 編成</div>
    <div class="pks-step" id="stepTab1">② ポケモン</div>
    <div class="pks-step" id="stepTab2">③ 料理</div>
    <div class="pks-step" id="stepTab3">④ 結果</div>
  </div>

  <!-- ===== STEP 0: 編成設定 ===== -->
  <div id="step0">
    <div class="pks-panel">
      <div class="pks-panel-title">🧩 チーム編成（合計5体）</div>
      <div class="pks-comp-grid">
        <div class="pks-comp-item">
          <span class="pks-comp-emoji">🍒</span>
          <div class="pks-comp-label">きのみ</div>
          <div class="pks-counter">
            <button class="pks-counter-btn" onclick="changeComp('berry',-1)">−</button>
            <span class="pks-counter-val" id="compVal_berry">0</span>
            <button class="pks-counter-btn" onclick="changeComp('berry',1)">＋</button>
          </div>
        </div>
        <div class="pks-comp-item">
          <span class="pks-comp-emoji">🍳</span>
          <div class="pks-comp-label">食材</div>
          <div class="pks-counter">
            <button class="pks-counter-btn" onclick="changeComp('ing',-1)">−</button>
            <span class="pks-counter-val" id="compVal_ing">0</span>
            <button class="pks-counter-btn" onclick="changeComp('ing',1)">＋</button>
          </div>
        </div>
        <div class="pks-comp-item">
          <span class="pks-comp-emoji">⚡</span>
          <div class="pks-comp-label">スキル</div>
          <div class="pks-counter">
            <button class="pks-counter-btn" onclick="changeComp('skill',-1)">−</button>
            <span class="pks-counter-val" id="compVal_skill">0</span>
            <button class="pks-counter-btn" onclick="changeComp('skill',1)">＋</button>
          </div>
        </div>
        <div class="pks-comp-item">
          <span class="pks-comp-emoji">💚</span>
          <div class="pks-comp-label">ヒーラー</div>
          <div class="pks-counter">
            <button class="pks-counter-btn" onclick="changeComp('healer',-1)">−</button>
            <span class="pks-counter-val" id="compVal_healer">0</span>
            <button class="pks-counter-btn" onclick="changeComp('healer',1)">＋</button>
          </div>
        </div>
      </div>
      <div class="pks-comp-total ng" id="compTotal">合計 0 / 5 体</div>
    </div>
    <button class="pks-btn-primary" id="btnToStep1" disabled>次へ：ポケモンを登録する →</button>
  </div>

  <!-- ===== STEP 1: ポケモン登録 ===== -->
  <div id="step1" class="pks-hidden">
    <div id="pokemonSections"></div>
    <button class="pks-btn-secondary" id="btnBack0">← 編成を修正</button>
    <button class="pks-btn-primary" id="btnToStep2">次へ：料理を登録する →</button>
  </div>

  <!-- ===== STEP 2: 料理登録 ===== -->
  <div id="step2" class="pks-hidden">
    <div class="pks-panel">
      <div class="pks-panel-title">🍽️ 21食分の料理を登録</div>
      <p style="font-size:12px;color:var(--pks-text-dim);margin-bottom:12px;">
        ジャンルと料理名を選び、食数を入力してください。
      </p>
      <div id="recipeList"></div>
      <button class="pks-btn-add" id="btnAddRecipe">＋ 料理を追加</button>
      <div class="pks-total-line ng" id="recipeTotal">合計：0 食</div>
    </div>
    <button class="pks-btn-secondary" id="btnBack1">← ポケモンを修正</button>
    <button class="pks-btn-primary" id="btnToStep3">計算する →</button>
  </div>

  <!-- ===== STEP 3: 結果 ===== -->
  <div id="step3" class="pks-hidden">
    <div class="pks-panel">
      <div id="resultContent"></div>
    </div>
    <button class="pks-btn-secondary" id="btnBack2">← 料理を修正</button>
    <button class="pks-btn-secondary" id="btnRestart">最初からやり直す</button>
  </div>

  <p class="pks-footnote">トフメンタルパパのポケモンスリープ攻略ツール</p>
</div>

<script>

function initEvents() {
  document.getElementById("btnToStep1").addEventListener("click", () => {

  });

/* ===== ステップ切替 ===== */
function goStep(n) {
  ["step0","step1","step2","step3"].forEach((id,i) => {
    document.getElementById(id).classList.toggle("pks-hidden", i !== n);
  });
  ["stepTab0","stepTab1","stepTab2","stepTab3"].forEach((id,i) => {
    const el = document.getElementById(id);
    el.className = "pks-step" + (i < n ? " done" : i === n ? " active" : "");
  });
  if (n === 3) calculate();
}

/* ===== 編成カウンター ===== */
function changeComp(key, delta) {
  const total = comp.berry + comp.ing + comp.skill + comp.healer;
  const next = comp[key] + delta;
  if (next < 0) return;
  if (delta > 0 && total >= 5) return;
  comp[key] = next;
  updateCompUI();
}

function updateCompUI() {
  const total = comp.berry + comp.ing + comp.skill + comp.healer;
  SLOT_CONFIG.forEach(s => {
    document.getElementById(`compVal_${s.key}`).textContent = comp[s.key];
  });
  const totalEl = document.getElementById("compTotal");
  totalEl.textContent = `合計 ${total} / 5 体`;
  totalEl.className = "pks-comp-total " + (total === 5 ? "ok" : "ng");
  document.getElementById("btnToStep1").disabled = total !== 5;
}

let ingPanel = null; // 食材パネルへの参照

function buildPokemonSlots() {
  pokemonSlots = [];
  ingPanel = null;
  const section = document.getElementById("pokemonSections");
  section.innerHTML = "";

  SLOT_CONFIG.forEach(cfg => {
    const count = comp[cfg.key];
    if (count === 0) return;

    const panel = document.createElement("div");
    panel.className = "pks-panel";

    if (cfg.key === "ing") {
      // 食材パネル：タイトル＋追加ボタン、カードはid管理
      ingPanel = panel;
      const titleBar = document.createElement("div");
      titleBar.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;";
      titleBar.innerHTML = `
        <span class="pks-panel-title" style="margin-bottom:0" id="ingPanelTitle">${cfg.emoji} ${cfg.label}ポケモン（枠${count}・登録${count}体）</span>
        <button class="pks-btn-add" style="width:auto;margin:0;padding:6px 14px;font-size:12px;" onclick="addIngPokemonCard()">＋ 追加</button>
      `;
      panel.appendChild(titleBar);
      panel.setAttribute("id", "ingPanelInner");

      for (let i = 0; i < count; i++) {
        addIngPokemonCard(panel);
      }
    } else {
      // 固定枠（きのみ・スキル・ヒーラー）
      panel.innerHTML = `<div class="pks-panel-title">${cfg.emoji} ${cfg.label}ポケモン（${count}体）</div>`;
      for (let i = 0; i < count; i++) {
        const id = uid++;
        const prefix = `slot_${id}`;
        pokemonSlots.push({ slotType: cfg.key, prefix, cls: cfg.cls });

        const card = document.createElement("div");
        card.className = "pks-pokemon-card";
        card.innerHTML = `
          <div class="pks-card-header">
            <span class="pks-card-label ${cfg.cls}">${cfg.emoji} ${cfg.label} ${i+1}</span>
          </div>
          ${pokemonFormHTML(prefix)}
        `;
        panel.appendChild(card);
      }
    }
    section.appendChild(panel);
  });
}

function addIngPokemonCard(panel) {
  const target = panel || document.getElementById("ingPanelInner");
  if (!target) return;

  const id = uid++;
  const prefix = `slot_${id}`;
  pokemonSlots.push({ slotType: "ing", prefix, cls: "ing", cardId: id });

  const cfg = SLOT_CONFIG.find(c => c.key === "ing");
  const ingSlots = pokemonSlots.filter(s => s.slotType === "ing");
  const num = ingSlots.length;

  const card = document.createElement("div");
  card.className = "pks-pokemon-card";
  card.id = `ingCard_${id}`;
  card.innerHTML = `
    <div class="pks-card-header">
      <span class="pks-card-label ing" id="ingCardLabel_${id}">${cfg.emoji} 食材 ${num}</span>
      <button class="pks-remove-btn" onclick="removeIngPokemonCard(${id})">削除</button>
    </div>
    ${pokemonFormHTML(prefix)}
  `;
  target.appendChild(card);
  updateIngPanelTitle();
}

function removeIngPokemonCard(cardId) {
  // 枠数より多い分だけ削除可能
  const ingSlots = pokemonSlots.filter(s => s.slotType === "ing");
  if (ingSlots.length <= comp.ing) return; // 枠数以下にはできない

  pokemonSlots = pokemonSlots.filter(s => !(s.slotType === "ing" && s.cardId === cardId));
  document.getElementById(`ingCard_${cardId}`)?.remove();
  renumberIngCards();
  updateIngPanelTitle();
}

function renumberIngCards() {
  const cfg = SLOT_CONFIG.find(c => c.key === "ing");
  pokemonSlots.filter(s => s.slotType === "ing").forEach((s, i) => {
    const el = document.getElementById(`ingCardLabel_${s.cardId}`);
    if (el) el.textContent = `${cfg.emoji} 食材 ${i+1}`;
  });
}

function updateIngPanelTitle() {
  const ingCount = pokemonSlots.filter(s => s.slotType === "ing").length;
  const el = document.getElementById("ingPanelTitle");
  if (el) el.textContent = `🍳 食材ポケモン（枠${comp.ing}・登録${ingCount}体）`;
}

/* ===== 計算 ===== */
function getEntry(pre) {
  const name = document.getElementById(`${pre}_p`)?.value;
  if (!name) return null;
  const pokemon = pokemonDB.find(p => p.name === name);
  if (!pokemon) return null;
  return {
    pokemon,
    level:     Number(document.getElementById(`${pre}_lv`)?.value||50),
    pattern:   document.getElementById(`${pre}_pat`)?.value||"aab",
    natureUp:  document.getElementById(`${pre}_nu`)?.value||"other",
    natureDown:document.getElementById(`${pre}_nd`)?.value||"other",
    subs: SUB_IDS.map(sid => document.getElementById(`${pre}_${sid}`)?.value||"その他")
  };
}

function calcWeekly(entry) {
  if (!entry) return {};
  const {pokemon,level,pattern,natureUp,natureDown,subs} = entry;
  const speedM   = subs.filter(s=>s==="おてスピM").length;
  const speedS   = subs.filter(s=>s==="おてスピS").length;
  const oteBonus = subs.filter(s=>s==="おてぼ").length;
  const foodM    = subs.filter(s=>s==="食材確率M").length;
  const foodS    = subs.filter(s=>s==="食材確率S").length;

  let tf = 1.0;
  if (natureUp==="speedUp")    tf *= 0.9;
  if (natureDown==="speedDown") tf *= 1.075;
  tf *= 0.86**speedM;
  tf *= 0.93**speedS;
  tf *= 0.95**oteBonus;

  const levelCoef = 1 - (level-1)*LEVEL_TIME_COEF;
  const interval  = (pokemon.helpTime * levelCoef * tf) / BASE_DIVISOR;
  const hpw       = WEEK_SECONDS / interval;

  let fr = (pokemon.ingredientFindRate??0)/100;
  fr += 0.36*foodM + 0.18*foodS;
  if (natureUp==="foodUp")    fr *= 1.2;
  if (natureDown==="foodDown") fr *= 0.8;
  fr = Math.max(0, Math.min(1, fr));

  const slots = level<30?[1]:level<60?[1,2]:[1,2,3];
  const sp = 1/slots.length;
  const result = {};

  for (const slot of slots) {
    let ing=null, cnt=0;
    if (slot===1){ ing=pokemon.ingredientA; cnt=pokemon["1a"]??0; }
    else if (slot===2){
      const t=pattern[1];
      ing = t==="a"?pokemon.ingredientA:pokemon.ingredientB;
      cnt = t==="a"?(pokemon["2a"]??0):(pokemon["2b"]??0);
    } else {
      const t=pattern[2];
      if (t==="a"){ ing=pokemon.ingredientA; cnt=pokemon["3a"]??0; }
      else if (t==="b"){ ing=pokemon.ingredientB; cnt=pokemon["3b"]??0; }
      else { ing=pokemon.ingredientC; cnt=pokemon["3c"]??0; }
    }
    if (ing && cnt>0) {
      const k=normIng(ing);
      result[k]=(result[k]??0)+hpw*fr*cnt*sp;
    }
  }
  return result;
}

function mergeIng(a,b) {
  const r={...a};
  for (const [k,v] of Object.entries(b)) r[k]=(r[k]??0)+v;
  return r;
}

function calculate() {
  let have = {};
  const perPokemon = [];

  for (const slot of pokemonSlots) {
    const e = getEntry(slot.prefix);
    if (!e) continue;
    const weekly = calcWeekly(e);
    have = mergeIng(have, weekly);
    const daily = {};
    for (const [k,v] of Object.entries(weekly)) daily[k] = v / 7;
    perPokemon.push({ name: e.pokemon.name, slotType: slot.slotType, daily });
  }

  const need = {};
  for (const id of recipeRows) {
    const genre = document.getElementById(`rg_${id}`)?.value;
    const name  = document.getElementById(`rn_${id}`)?.value;
    const count = Number(document.getElementById(`rc_${id}`)?.value||0);
    if (!genre||!name||count===0) continue;
    const recipe = RECIPE_DATA.recipes[genre]?.[name];
    if (!recipe) continue;
    for (const [ing,perR] of Object.entries(recipe)) {
      const k=normIng(ing);
      need[k]=(need[k]??0)+perR*count;
    }
  }

  const needKeys = Object.keys(need);
  let allOk = true, minRatio = Infinity;
  for (const k of needKeys) {
    const ratio = (have[k]??0)/need[k];
    if (ratio<1) allOk=false;
    if (ratio<minRatio) minRatio=ratio;
  }
  if (needKeys.length===0){ minRatio=1; allOk=true; }

  // 余剰食材（週間）= have - need
  const surplus = {};
  for (const [k,v] of Object.entries(have)) {
    const leftover = v - (need[k] ?? 0);
    if (leftover > 0.05) surplus[k] = leftover;
  }

  const surplusDays = allOk ? 7*(minRatio-1) : 0;
  renderResult(have, need, surplus, perPokemon, allOk, minRatio, surplusDays);
}

function renderResult(have, need, surplus, perPokemon, allOk, minRatio, surplusDays) {
  const needKeys = Object.keys(need);

  // 食材充足バー
  const ingHtml = needKeys.map(k => {
    const h=have[k]??0, n=need[k];
    const ok=h>=n;
    const pct=Math.round(Math.min(h/n,1)*100);
    return `<div class="pks-ing-card">
      <div class="pks-ing-name">${k}</div>
      <div class="pks-ing-bar-bg"><div class="pks-ing-bar ${ok?"ok":"ng"}" style="width:${pct}%"></div></div>
      <div class="pks-ing-nums">
        <span class="pks-ing-have ${ok?"ok":"ng"}">${h.toFixed(1)}個</span>
        <span class="pks-ing-need">必要:${n}</span>
      </div>
    </div>`;
  }).join("");

  // 時間的余力 or 不足
  let detailHtml = "";
  if (allOk) {
    detailHtml = `<div class="pks-surplus">
      <div class="pks-surplus-label">⏱ 時間的余力（最もきつい食材基準）</div>
      <div class="pks-surplus-val">+${surplusDays.toFixed(1)} 日分</div>
      <div class="pks-surplus-desc">21食分を約 ${(7-surplusDays).toFixed(1)} 日で集められる計算です。充足率：${(minRatio*100).toFixed(0)}%</div>
    </div>`;
  } else {
    const shortages = needKeys
      .filter(k=>(have[k]??0)<need[k])
      .map(k=>`・${k}：あと ${(need[k]-(have[k]??0)).toFixed(1)} 個不足`)
      .join("<br>");
    detailHtml = `<div class="pks-shortage">
      <div class="pks-shortage-label">⚠️ 不足している食材</div>
      <div class="pks-shortage-item">${shortages}</div>
    </div>`;
  }

  // ポケモン別食材内訳（1日あたり）
  const slotEmoji = { berry:"🍒", ing:"🍳", skill:"⚡", healer:"💚" };
  const pbHtml = perPokemon.map(p => {
    const lines = Object.entries(p.daily)
      .filter(([,v])=>v>0.01)
      .map(([k,v])=>`<div class="pks-pb-row"><span class="pks-pb-ing">${k}</span><span class="pks-pb-val">${v.toFixed(2)}個/日</span></div>`)
      .join("");
    return `<div class="pks-pb-card">
      <div class="pks-pb-name">${slotEmoji[p.slotType]??""} ${p.name}</div>
      ${lines||'<div style="font-size:11px;color:var(--pks-text-dim)">食材なし</div>'}
    </div>`;
  }).join("");

  // 余剰食材（週間）
  const surplusEntries = Object.entries(surplus).sort((a,b)=>b[1]-a[1]);
  const surplusListHtml = surplusEntries.length
    ? surplusEntries.map(([k,v])=>`・${k}：${v.toFixed(1)}個/週`).join("<br>")
    : "なし";

  document.getElementById("resultContent").innerHTML = `
    <div class="pks-verdict">
      <div class="pks-verdict-main ${allOk?"ok":"ng"}">${allOk?"✅ 21食分 準備OK！":"❌ 食材が不足しています"}</div>
      <div class="pks-verdict-sub">1週間（7日）・21食分シミュレーション結果</div>
    </div>
    ${needKeys.length?`<div class="pks-result-section-title">食材ごとの充足状況（週間）</div><div class="pks-ing-grid">${ingHtml}</div>`:""}
    ${detailHtml}
    <div class="pks-result-section-title" style="margin-top:16px;">🐾 ポケモン別 食材獲得量（1日あたり）</div>
    <div class="pks-pb-list">${pbHtml}</div>
    <div class="pks-extra">
      <div class="pks-extra-label">📦 余剰食材（週間・料理使用後の残り）</div>
      <div class="pks-extra-item">${surplusListHtml}</div>
    </div>
  `;
}

loadDB();
</script>
