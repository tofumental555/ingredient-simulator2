<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食材厳選シミュレーション｜ポケモンスリープ攻略ツール</title>
  <style>
    /* （中略：あなたが提示したCSSをそのまま使用） */
  </style>
</head>

<body>
  <div class="pks-wrap">

    <div class="pks-eyebrow">POKEMON SLEEP TOOLS</div>
    <h1>食材厳選シミュレーション</h1>
    <p class="pks-sub">ポケモンとレベルを選ぶだけで、1日に集まる食材の期待値を計算します。</p>

    <div class="pks-panel">

      <div class="field">
        <label for="pokemonSelect">🌙 ポケモン</label>
        <div class="pks-select-wrap">
          <select id="pokemonSelect"></select>
        </div>
      </div>

      <div class="field">
        <label for="levelInput">⭐ レベル</label>
        <div class="pks-level-row">
          <input id="levelInput" type="number" min="1" max="60" value="50">
        </div>
      </div>

      <div class="field">
        <label class="pks-toggle-row" for="berrySCheckbox">
          <span class="pks-toggle-label">🍓 きのみの数Sを持っている</span>
          <input id="berrySCheckbox" type="checkbox">
        </label>
      </div>

      <button id="calcButton">1日の期待値を計算</button>

      <div id="result">
        ポケモンとレベルを選んで計算ボタンを押してください。
      </div>

    </div>

    <p class="pks-footnote">トフメンタルパパのポケモンスリープ攻略ツール</p>
  </div>

  <script src="main.js"></script>
</body>
</html>
