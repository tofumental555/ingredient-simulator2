<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食材厳選シミュレーション｜ポケモンスリープ攻略ツール</title>

  <style>
    /* ここにあなたの既存CSSをそのまま貼り付けてOK */
  </style>
</head>

<body>
  <div class="pks-wrap">

    <div class="pks-eyebrow">POKEMON SLEEP TOOLS</div>
    <h1>食材厳選シミュレーション</h1>
    <p class="pks-sub">ポケモン・性格・サブスキル・食材配列を指定して、1日の期待値エナジーを計算します。</p>

    <div class="pks-panel">

      <!-- ポケモン -->
      <div class="field">
        <label for="pokemonSelect">🌙 ポケモン</label>
        <div class="pks-select-wrap">
          <select id="pokemonSelect"></select>
        </div>
      </div>

      <!-- レベル -->
      <div class="field">
        <label for="levelInput">⭐ レベル</label>
        <div class="pks-level-row">
          <input id="levelInput" type="number" min="1" max="60" value="50">
        </div>
      </div>

      <!-- 性格：上昇補正 -->
      <div class="field">
        <label for="natureUpSelect">📘 性格（上昇）</label>
        <div class="pks-select-wrap">
          <select id="natureUpSelect">
            <option value="other" selected>その他（補正なし）</option>
            <option value="speedUp">おてスピ↑</option>
            <option value="foodUp">食材確率↑</option>
            <option value="skillUp">スキル確率↑</option>
          </select>
        </div>
      </div>

      <!-- 性格：下降補正 -->
      <div class="field">
        <label for="natureDownSelect">📕 性格（下降）</label>
        <div class="pks-select-wrap">
          <select id="natureDownSelect">
            <option value="other" selected>その他（補正なし）</option>
            <option value="speedDown">おてスピ↓</option>
            <option value="foodDown">食材確率↓</option>
            <option value="skillDown">スキル確率↓</option>
          </select>
        </div>
      </div>

      <!-- サブスキル5枠 -->
      <div class="field">
        <label>🔧 サブスキル（5枠）</label>
        <div class="pks-select-wrap"><select id="sub10"></select></div>
        <div class="pks-select-wrap"><select id="sub25"></select></div>
        <div class="pks-select-wrap"><select id="sub50"></select></div>
        <div class="pks-select-wrap"><select id="sub75"></select></div>
        <div class="pks-select-wrap"><select id="sub100"></select></div>
      </div>

      <!-- 食材配列 -->
      <div class="field">
        <label>🍳 食材配列（個数）</label>

        <div class="pks-level-row">
          <span>A</span>
          <input id="ingA" type="number" min="0" value="0">
        </div>

        <div class="pks-level-row">
          <span>B</span>
          <input id="ingB" type="number" min="0" value="0">
        </div>

        <div class="pks-level-row">
          <span>C</span>
          <input id="ingC" type="number" min="0" value="0">
        </div>
      </div>

      <button id="calcButton">1日の期待値を計算</button>

      <div id="result">
        必要な項目を入力して計算ボタンを押してください。
      </div>

    </div>

    <p class="pks-footnote">トフメンタルパパのポケモンスリープ攻略ツール</p>
  </div>

  <script src="main.js"></script>
</body>
</html>
